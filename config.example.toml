# Kodebase runtime config.
#
# Set APP_CONFIG to point at this file if you want to load a TOML config.
# The current CLI feature surface is configured primarily through command flags:
# - `kodebase generate`
# - `kodebase inspect ...`
# - `kodebase search`
# - `kodebase index`
#
# Runtime values loaded from the environment by internal/config:
# - DATABASE_URL
# - API_KEY
# - FIRECRAWL_API_KEY
# - FIRECRAWL_API_URL
# - OPENROUTER_API_KEY
# - OPENROUTER_API_URL

[app]
name = "kodebase"
env = "development"

[server]
host = "127.0.0.1"
port = 8080

[log]
level = "info"

[firecrawl]
api_key = ""
api_url = "https://api.firecrawl.dev"

[openrouter]
api_key = ""
api_url = "https://openrouter.ai/api"
stt_model = "google/gemini-2.5-flash"

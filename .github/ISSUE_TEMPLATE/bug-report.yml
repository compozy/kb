name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Run `kodebase generate ./my-repo`
        2. Run `kodebase inspect complexity`
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages or output if applicable.
    validations:
      required: true

  - type: dropdown
    id: command
    attributes:
      label: Command
      description: Which command were you running?
      options:
        - generate
        - inspect
        - search
        - index
        - Other
    validations:
      required: true

  - type: dropdown
    id: language
    attributes:
      label: Repository Language
      description: What language is the repository you're analyzing?
      multiple: true
      options:
        - TypeScript
        - JavaScript
        - Go
        - Mixed
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Kodebase Version
      description: "Output of: kodebase version"
    validations:
      required: false

  - type: input
    id: go-version
    attributes:
      label: Go Version
      description: "Output of: go version"
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant terminal output or error logs.
      render: shell
    validations:
      required: false

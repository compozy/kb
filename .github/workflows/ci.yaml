name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-title:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          requireScope: true
          types: |
            build
            ci
            docs
            feat
            fix
            perf
            refactor
            test
          scopes: |
            repo
            release
            cli
            topic
            ingest
            convert
            lint
            inspect
            vault
            qmd
            config
            version
            docs
            test
            ci

  check:
    runs-on: ubuntu-latest
    if: |
      !(github.event_name == 'pull_request' &&
        startsWith(github.event.pull_request.title, 'ci(release):'))
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-go
        with:
          go-version: "1.24"

      - run: make verify
